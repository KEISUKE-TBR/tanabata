document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"35f911dd-7f14-48cd-920d-25483910ccdb\"><\u002Fscript>\n\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin=\"\">\n<script>(function () { var l = document.createElement('link'); l.rel = 'stylesheet'; l.href = 'https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@400;600;700&family=Klee+One:wght@400;600&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap'; document.head.appendChild(l); })();<\u002Fscript>\n<style>\nhtml, body { margin: 0; padding: 0; background: #02040f; }\na { color: #ffd98a; } a:hover { color: #ffe9b8; }\n@keyframes twinkle { 0%, 100% { opacity: 0.15; } 50% { opacity: 1; } }\n@keyframes tzsway { from { transform: rotate(calc(var(--wind, 1) * -5deg)); } to { transform: rotate(calc(var(--wind, 1) * 5deg)); } }\n@keyframes tzdrop { 0% { transform: translateY(46vh); opacity: 0; } 50% { opacity: 1; } 78% { transform: translateY(-12px); } 100% { transform: translateY(0); opacity: 1; } }\n@keyframes stalk { from { transform: rotate(calc(var(--wind, 1) * -0.6deg + var(--lean, 0deg))); } to { transform: rotate(calc(var(--wind, 1) * 0.9deg + var(--lean, 0deg))); } }\n@keyframes leaves { from { transform: rotate(calc(var(--wind, 1) * -6deg)); } to { transform: rotate(calc(var(--wind, 1) * 5deg)); } }\n@keyframes shoot { 0% { transform: translate(0, 0) rotate(-32deg); opacity: 0; } 1.5% { opacity: 1; } 7% { transform: translate(-46vw, 28vh) rotate(-32deg); opacity: 0; } 100% { transform: translate(-46vw, 28vh) rotate(-32deg); opacity: 0; } }\n@keyframes bokeh { 0% { transform: translate(0, 0); opacity: 0; } 30% { opacity: 0.9; } 70% { opacity: 0.5; } 100% { transform: translate(-26px, -64px); opacity: 0; } }\n@keyframes popIn { from { transform: scale(0.92) translateY(16px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }\n@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }\n@keyframes readIn { 0% { transform: scale(0.5) rotate(7deg); opacity: 0; } 60% { transform: scale(1.04) rotate(-2deg); opacity: 1; } 100% { transform: scale(1) rotate(0deg); opacity: 1; } }\n@keyframes spark { from { transform: translate(0, 0) scale(1); opacity: 1; } to { transform: translate(var(--dx, 30px), var(--dy, -30px)) scale(0.15); opacity: 0; } }\n<\u002Fstyle>\n<\u002Fhelmet>\n<div ref=\"{{ sceneRef }}\" style=\"position: relative; width: 100%; height: 100vh; min-height: 560px; overflow: hidden; background: linear-gradient(180deg, var(--sky0, #02040f) 0%, var(--sky1, #071030) 42%, var(--sky2, #12204d) 76%, var(--glow, #1c2c5e) 100%); font-family: 'Zen Kaku Gothic New', sans-serif; color: #eef2ff;\">\n\n  <!-- 星雲 -->\n  <div style=\"position: absolute; left: 14%; top: 20%; width: 46%; height: 48%; background: radial-gradient(closest-side, var(--neb1, rgba(110,100,230,0.4)), rgba(0,0,0,0) 72%); filter: blur(34px); pointer-events: none;\"><\u002Fdiv>\n  <div style=\"position: absolute; left: 28%; top: 34%; width: 32%; height: 36%; background: radial-gradient(closest-side, var(--neb2, rgba(230,120,210,0.28)), rgba(0,0,0,0) 70%); filter: blur(28px); pointer-events: none;\"><\u002Fdiv>\n  <div style=\"position: absolute; left: 36%; top: 40%; width: 16%; height: 18%; background: radial-gradient(closest-side, rgba(255,255,255,0.16), rgba(0,0,0,0) 70%); filter: blur(18px); pointer-events: none;\"><\u002Fdiv>\n\n  <!-- 天の川 -->\n  <div style=\"position: absolute; left: -22%; top: 4%; width: 150%; height: 34%; transform: rotate(23deg); background: linear-gradient(180deg, rgba(0,0,0,0), var(--mw, rgba(170,200,255,0.6)), rgba(0,0,0,0)); opacity: 0.28; filter: blur(32px); pointer-events: none;\"><\u002Fdiv>\n  <div style=\"position: absolute; left: -22%; top: 13%; width: 150%; height: 11%; transform: rotate(23deg); background: linear-gradient(180deg, rgba(0,0,0,0), var(--mw, rgba(170,200,255,0.6)), rgba(0,0,0,0)); opacity: 0.42; filter: blur(15px); pointer-events: none;\"><\u002Fdiv>\n\n  <!-- 星 -->\n  <sc-for list=\"{{ stars }}\" as=\"st\" hint-placeholder-count=\"8\">\n    <div style=\"position: absolute; left: {{ st.x }}%; top: {{ st.y }}%; width: {{ st.s }}px; height: {{ st.s }}px; border-radius: 50%; background: #ffffff; opacity: {{ st.o }}; animation: twinkle {{ st.t }}s ease-in-out {{ st.d }}s infinite; pointer-events: none;\"><\u002Fdiv>\n  <\u002Fsc-for>\n\n  <!-- 流れ星 -->\n  <div style=\"position: absolute; left: 60%; top: 12%; width: 150px; height: 2px; border-radius: 2px; background: linear-gradient(90deg, #ffffff, rgba(255,255,255,0)); opacity: 0; animation: shoot 11s linear 3s infinite; pointer-events: none;\"><\u002Fdiv>\n  <div style=\"position: absolute; left: 44%; top: 5%; width: 110px; height: 2px; border-radius: 2px; background: linear-gradient(90deg, #ffffff, rgba(255,255,255,0)); opacity: 0; animation: shoot 17s linear 9s infinite; pointer-events: none;\"><\u002Fdiv>\n  <div style=\"position: absolute; left: 70%; top: 32%; width: 90px; height: 2px; border-radius: 2px; background: linear-gradient(90deg, #ffffff, rgba(255,255,255,0)); opacity: 0; animation: shoot 23s linear 15s infinite; pointer-events: none;\"><\u002Fdiv>\n\n  <!-- 光の粒(蛍・ぼかし玉) -->\n  <sc-for list=\"{{ bokeh }}\" as=\"b\" hint-placeholder-count=\"4\">\n    <div style=\"position: absolute; left: {{ b.x }}%; top: {{ b.y }}%; width: {{ b.s }}px; height: {{ b.s }}px; border-radius: 50%; background: {{ b.c }}; box-shadow: {{ b.glow }}; filter: blur(1px); opacity: 0; animation: bokeh {{ b.dur }}s ease-in-out {{ b.delay }}s infinite; pointer-events: none;\"><\u002Fdiv>\n  <\u002Fsc-for>\n\n  <!-- 奥の笹(ぼかし) -->\n  <div style=\"position: absolute; left: 88%; bottom: -4%; width: 16px; height: 92%; --lean: -4deg; transform-origin: bottom center; animation: stalk 8s ease-in-out -3s infinite alternate; z-index: 2; filter: blur(3px) brightness(0.45);\">\n    <div style=\"position: absolute; inset: 0; clip-path: polygon(34% 0, 66% 0, 100% 100%, 0 100%); background: repeating-linear-gradient(180deg, rgba(0,0,0,0) 0px, rgba(0,0,0,0) 96px, rgba(4,14,9,0.8) 96px, rgba(4,14,9,0.8) 101px), linear-gradient(90deg, #0e2418, #2a5c3e 34%, #4c8a63 48%, #21432e 74%, #0b1d12);\"><\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"position: absolute; left: 15%; bottom: -3%; width: 12px; height: 74%; --lean: 3deg; transform-origin: bottom center; animation: stalk 9s ease-in-out -1s infinite alternate; z-index: 2; filter: blur(4px) brightness(0.35);\">\n    <div style=\"position: absolute; inset: 0; clip-path: polygon(34% 0, 66% 0, 100% 100%, 0 100%); background: linear-gradient(90deg, #0a1c12, #234b35 45%, #0a1c12);\"><\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"position: absolute; left: 35%; bottom: -3%; width: 11px; height: 64%; --lean: -2deg; transform-origin: bottom center; animation: stalk 8.5s ease-in-out -4s infinite alternate; z-index: 2; filter: blur(4px) brightness(0.35);\">\n    <div style=\"position: absolute; inset: 0; clip-path: polygon(34% 0, 66% 0, 100% 100%, 0 100%); background: linear-gradient(90deg, #0a1c12, #234b35 45%, #0a1c12);\"><\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"position: absolute; left: 92%; bottom: -3%; width: 13px; height: 78%; --lean: -4deg; transform-origin: bottom center; animation: stalk 9.5s ease-in-out -6s infinite alternate; z-index: 2; filter: blur(4px) brightness(0.35);\">\n    <div style=\"position: absolute; inset: 0; clip-path: polygon(34% 0, 66% 0, 100% 100%, 0 100%); background: linear-gradient(90deg, #0a1c12, #234b35 45%, #0a1c12);\"><\u002Fdiv>\n  <\u002Fdiv>\n  <sc-for list=\"{{ bgClusters }}\" as=\"cl\" hint-placeholder-count=\"3\">\n    <div style=\"position: absolute; left: {{ cl.x }}%; top: {{ cl.y }}%; width: 150px; height: 110px; margin-left: -75px; margin-top: -55px; z-index: 2; transform: scale({{ cl.scale }}); filter: blur(2.5px) brightness(0.45); pointer-events: none;\">\n      <div style=\"position: absolute; inset: 0; transform-origin: 60% 30%; animation: leaves {{ cl.dur }}s ease-in-out {{ cl.delay }}s infinite alternate;\">\n        <sc-for list=\"{{ cl.leaves }}\" as=\"lf\" hint-placeholder-count=\"3\">\n          <div style=\"position: absolute; left: 72px; top: 40px; width: {{ lf.len }}px; height: {{ lf.h }}px; border-radius: 0 100% 0 100%; background: linear-gradient(90deg, {{ lf.g1 }}, {{ lf.g2 }}); transform: rotate({{ lf.rot }}deg); transform-origin: left center;\"><\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-for>\n\n  <!-- 七夕笹の木(右寄せの幹) -->\n  <div style=\"position: absolute; left: 72%; bottom: -2%; width: 14px; height: 102%; margin-left: -7px; --lean: -1deg; transform-origin: bottom center; animation: stalk 7s ease-in-out infinite alternate; z-index: 3;\">\n    <div style=\"position: absolute; inset: 0; clip-path: polygon(36% 0, 64% 0, 100% 100%, 0 100%); background: repeating-linear-gradient(180deg, rgba(0,0,0,0) 0px, rgba(0,0,0,0) 104px, rgba(4,14,9,0.75) 104px, rgba(4,14,9,0.75) 110px, rgba(150,210,170,0.25) 110px, rgba(150,210,170,0.25) 112px), linear-gradient(90deg, #0e2418, #2f6645 30%, #4d8a63 46%, #2c5a3e 72%, #0b1d12); box-shadow: inset -5px 0 12px rgba(70,110,200,0.3);\"><\u002Fdiv>\n  <\u002Fdiv>\n  <!-- 枝 -->\n  <sc-for list=\"{{ branches }}\" as=\"br\" hint-placeholder-count=\"4\">\n    <div style=\"position: absolute; left: 72%; top: {{ br.y }}%; width: {{ br.len }}px; height: 2px; border-radius: 2px; opacity: 0.85; background: linear-gradient(90deg, #2a5a3e, #12301f 92%, rgba(18,48,31,0)); transform: rotate({{ br.rot }}deg); transform-origin: left center; animation: leaves {{ br.dur }}s ease-in-out {{ br.delay }}s infinite alternate; z-index: 3;\"><\u002Fdiv>\n  <\u002Fsc-for>\n\n  <!-- 笹の葉(中景・カーソルでもしゃもしゃ) -->\n  <sc-for list=\"{{ midClusters }}\" as=\"cl\" hint-placeholder-count=\"4\">\n    <div onmousemove=\"{{ rustleMove }}\" style=\"position: absolute; left: {{ cl.x }}px; top: {{ cl.y }}px; width: 150px; height: 110px; margin-left: -75px; margin-top: -55px; z-index: 4; transform: scale({{ cl.scale }});\">\n      <div style=\"position: absolute; inset: 0; transform-origin: 60% 30%; animation: leaves {{ cl.dur }}s ease-in-out {{ cl.delay }}s infinite alternate;\" style-hover=\"animation-duration: 1.1s;\">\n        <sc-for list=\"{{ cl.leaves }}\" as=\"lf\" hint-placeholder-count=\"3\">\n          <div style=\"position: absolute; left: 72px; top: 40px; width: {{ lf.len }}px; height: {{ lf.h }}px; border-radius: 0 100% 0 100%; background: linear-gradient(90deg, {{ lf.g1 }}, {{ lf.g2 }}); transform: rotate({{ lf.rot }}deg); transform-origin: left center; box-shadow: 0 1px 4px rgba(0,0,0,0.35);\"><\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-for>\n\n  <!-- 短冊 -->\n  <sc-for list=\"{{ wishes }}\" as=\"w\" hint-placeholder-count=\"5\">\n    <div style=\"position: absolute; left: {{ w.x }}px; top: {{ w.y }}px; margin-left: {{ w.mh }}px; animation: {{ w.anim }}; z-index: 5;\">\n      <div style=\"transform-origin: top center; animation: {{ w.anim2 }};\">\n      <div style=\"display: flex; flex-direction: column; align-items: center;\">\n        <div style=\"width: 5px; height: 5px; border-radius: 50%; background: #2f5f43; margin-bottom: -2px; box-shadow: 0 0 4px rgba(0,0,0,0.5);\"><\u002Fdiv>\n        <div style=\"width: 1px; height: {{ w.len }}px; background: rgba(255,240,200,0.5);\"><\u002Fdiv>\n        <div onclick=\"{{ w.open }}\" role=\"button\" tabindex=\"0\" style=\"cursor: pointer; width: {{ w.pw }}px; height: {{ w.ph }}px; background: {{ w.color }}; border-radius: 2px; position: relative; box-shadow: 0 6px 16px rgba(0,0,0,0.5), 0 0 14px rgba(255,255,255,0.1), inset 0 0 16px rgba(255,255,255,0.18); transition: filter 0.25s;\" style-hover=\"filter: brightness(1.2) saturate(1.15) drop-shadow(0 0 14px rgba(255,255,255,0.5));\">\n          <div style=\"position: absolute; top: 6px; left: 50%; margin-left: -3.5px; width: 7px; height: 7px; border-radius: 50%; background: var(--sky1, #071030); box-shadow: inset 0 0 0 1.5px rgba(0,0,0,0.25);\"><\u002Fdiv>\n          <div style=\"position: absolute; top: 18px; bottom: 22px; left: 7px; right: 7px; writing-mode: vertical-rl; font-family: 'Klee One', cursive; font-weight: 600; font-size: {{ w.fs }}px; line-height: 1.55; color: #33302a; overflow: hidden;\">{{ w.short }}<\u002Fdiv>\n          <div style=\"position: absolute; bottom: 5px; left: 0; right: 0; text-align: center; font-size: 8px; color: rgba(50,45,38,0.75); font-family: 'Klee One', cursive; white-space: nowrap; overflow: hidden;\">{{ w.name }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-for>\n\n  <!-- 笹の葉(前景シルエット) -->\n  <sc-for list=\"{{ fgClusters }}\" as=\"cl\" hint-placeholder-count=\"3\">\n    <div style=\"position: absolute; left: {{ cl.x }}px; top: {{ cl.y }}px; width: 150px; height: 110px; margin-left: -75px; margin-top: -55px; z-index: 6; transform: scale({{ cl.scale }}); filter: brightness(0.72); pointer-events: none;\">\n      <div style=\"position: absolute; inset: 0; transform-origin: 60% 30%; animation: leaves {{ cl.dur }}s ease-in-out {{ cl.delay }}s infinite alternate;\">\n        <sc-for list=\"{{ cl.leaves }}\" as=\"lf\" hint-placeholder-count=\"3\">\n          <div style=\"position: absolute; left: 72px; top: 40px; width: {{ lf.len }}px; height: {{ lf.h }}px; border-radius: 0 100% 0 100%; background: linear-gradient(90deg, {{ lf.g1 }}, {{ lf.g2 }}); transform: rotate({{ lf.rot }}deg); transform-origin: left center;\"><\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-for>\n\n  {{ sparkleBurst }}\n\n  <!-- 地面の霞 -->\n  <div style=\"position: absolute; left: 0; right: 0; bottom: 0; height: 20%; background: linear-gradient(180deg, rgba(3,5,22,0) 0%, rgba(5,9,30,0.55) 60%, rgba(3,5,20,0.88) 100%); pointer-events: none; z-index: 8;\"><\u002Fdiv>\n\n  <!-- タイトル(左・縦書き) -->\n  <div style=\"position: absolute; top: 6%; left: 4.5%; z-index: 9; pointer-events: none; display: flex; flex-direction: row-reverse; gap: 20px; align-items: flex-start;\">\n    <div style=\"writing-mode: vertical-rl; font-family: 'Zen Old Mincho', serif; font-size: clamp(19px, 2.2vw, 28px); font-weight: 700; letter-spacing: 0.24em; color: #fdf6e3; text-shadow: 0 0 10px rgba(4,8,26,0.95), 0 0 22px rgba(4,8,26,0.9), 0 2px 6px rgba(0,0,0,0.9);\">星に願いを<\u002Fdiv>\n    <div style=\"writing-mode: vertical-rl; margin-top: 10px; font-size: 11px; letter-spacing: 0.3em; line-height: 2; color: #d7e0ff; text-shadow: 0 0 8px rgba(4,8,26,0.95), 0 0 16px rgba(4,8,26,0.9), 0 1px 4px rgba(0,0,0,0.9);\">七月七日 ― 笹にかくれた短冊をみつけて、読んでみよう<\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- 右上コントロール -->\n  <div style=\"position: absolute; top: 18px; right: 18px; display: flex; align-items: center; gap: 16px; z-index: 20;\">\n    <div style=\"display: flex; gap: 8px; align-items: center;\">\n      <sc-for list=\"{{ themesList }}\" as=\"t\" hint-placeholder-count=\"3\">\n        <button onclick=\"{{ t.pick }}\" title=\"{{ t.label }}\" style=\"width: 18px; height: 18px; border-radius: 50%; cursor: pointer; padding: 0; background: {{ t.swatch }}; border: {{ t.border }};\"><\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <button onclick=\"{{ toggleSound }}\" title=\"{{ soundTitle }}\" style=\"width: 34px; height: 34px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.3); background: rgba(8,12,30,0.5); color: #eef2ff; cursor: pointer; opacity: {{ soundOpacity }}; font-size: 15px; line-height: 1;\">♪<\u002Fbutton>\n  <\u002Fdiv>\n\n  <!-- 下部 -->\n  <div style=\"position: absolute; bottom: calc(4.5% + 72px); left: 0; right: 0; text-align: center; font-size: 12px; letter-spacing: 0.2em; color: rgba(238,242,255,0.7); pointer-events: none; z-index: 15; text-shadow: 0 1px 6px rgba(0,0,0,0.7);\">{{ countLabel }} ・ 葉にふれると音がします<\u002Fdiv>\n  <button onclick=\"{{ openForm }}\" style=\"position: absolute; left: 50%; transform: translateX(-50%); bottom: 4.5%; padding: 16px 46px; border-radius: 999px; border: 1px solid var(--accent, #ffd98a); background: rgba(8,12,30,0.55); color: var(--accent, #ffd98a); font-size: 17px; font-family: 'Zen Old Mincho', serif; letter-spacing: 0.3em; text-indent: 0.3em; cursor: pointer; backdrop-filter: blur(6px); box-shadow: 0 0 26px rgba(255,217,138,0.18); z-index: 15; transition: all 0.25s;\" style-hover=\"background: rgba(255,217,138,0.16); box-shadow: 0 0 38px rgba(255,217,138,0.4);\">短冊に願いを書く<\u002Fbutton>\n\n  <!-- 願いを書くフォーム -->\n  <sc-if value=\"{{ formOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position: absolute; inset: 0; z-index: 30;\">\n      <div onclick=\"{{ closeForm }}\" style=\"position: absolute; inset: 0; background: rgba(2,4,14,0.62); backdrop-filter: blur(5px); animation: fadeIn 0.3s ease;\"><\u002Fdiv>\n      <div style=\"position: absolute; inset: 0; display: grid; place-items: center; pointer-events: none;\">\n        <div style=\"pointer-events: auto; width: min(92vw, 580px); max-height: 88vh; overflow: auto; background: var(--panel, rgba(10,16,44,0.92)); border: 1px solid rgba(255,255,255,0.14); border-radius: 18px; padding: 28px 30px; backdrop-filter: blur(16px); box-shadow: 0 30px 80px rgba(0,0,0,0.6); animation: popIn 0.35s cubic-bezier(0.3, 1.2, 0.4, 1);\">\n          <div style=\"font-family: 'Zen Old Mincho', serif; font-size: 22px; letter-spacing: 0.2em; color: #f5ecd8; margin-bottom: 20px;\">短冊に願いを書く<\u002Fdiv>\n          <div style=\"display: flex; gap: 26px; flex-wrap: wrap;\">\n            <div style=\"flex: 1; min-width: 240px; display: flex; flex-direction: column; gap: 14px;\">\n              <div style=\"display: flex; flex-direction: column; gap: 6px;\">\n                <div style=\"display: flex; justify-content: space-between; align-items: baseline;\">\n                  <label style=\"font-size: 12px; letter-spacing: 0.15em; color: var(--accent2, #a8bcff);\">ねがいごと<\u002Flabel>\n                  <span style=\"font-size: 11px; color: rgba(238,242,255,0.5);\">{{ charCount }}<\u002Fspan>\n                <\u002Fdiv>\n                <textarea value=\"{{ text }}\" onchange=\"{{ setText }}\" maxlength=\"240\" rows=\"5\" placeholder=\"ねがいごとを書いてください(240文字まで)\" style=\"resize: none; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.18); border-radius: 10px; color: #eef2ff; padding: 12px; font-family: 'Klee One', cursive; font-size: 15px; line-height: 1.6;\" style-focus=\"border-color: var(--accent, #ffd98a); outline: none; box-shadow: 0 0 0 3px rgba(255,217,138,0.15);\"><\u002Ftextarea>\n              <\u002Fdiv>\n              <div style=\"display: flex; flex-direction: column; gap: 6px;\">\n                <label style=\"font-size: 12px; letter-spacing: 0.15em; color: var(--accent2, #a8bcff);\">なまえ<\u002Flabel>\n                <input value=\"{{ name }}\" onchange=\"{{ setName }}\" maxlength=\"12\" placeholder=\"なまえ(なくてもOK)\" style=\"background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.18); border-radius: 10px; color: #eef2ff; padding: 11px 12px; font-family: 'Klee One', cursive; font-size: 14px;\" style-focus=\"border-color: var(--accent, #ffd98a); outline: none; box-shadow: 0 0 0 3px rgba(255,217,138,0.15);\">\n              <\u002Fdiv>\n              <div style=\"display: flex; flex-direction: column; gap: 8px;\">\n                <label style=\"font-size: 12px; letter-spacing: 0.15em; color: var(--accent2, #a8bcff);\">短冊の色<\u002Flabel>\n                <div style=\"display: flex; gap: 10px; flex-wrap: wrap;\">\n                  <sc-for list=\"{{ colors }}\" as=\"c\" hint-placeholder-count=\"6\">\n                    <button onclick=\"{{ c.pick }}\" title=\"{{ c.label }}\" style=\"width: 34px; height: 34px; border-radius: 50%; border: none; cursor: pointer; background: {{ c.hex }}; box-shadow: {{ c.ring }}; transition: transform 0.15s;\" style-hover=\"transform: scale(1.12);\"><\u002Fbutton>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display: flex; flex-direction: column; align-items: center; justify-content: center; min-width: 96px;\">\n              <div style=\"width: 1px; height: 26px; background: rgba(255,240,200,0.55);\"><\u002Fdiv>\n              <div style=\"width: 60px; height: 164px; background: {{ pvColor }}; border-radius: 2px; position: relative; box-shadow: 0 8px 20px rgba(0,0,0,0.45), 0 0 20px rgba(255,255,255,0.2), inset 0 0 20px rgba(255,255,255,0.3); transform-origin: top center; animation: tzsway 3.2s ease-in-out infinite alternate;\">\n                <div style=\"position: absolute; top: 6px; left: 50%; margin-left: -3.5px; width: 7px; height: 7px; border-radius: 50%; background: var(--sky1, #071030);\"><\u002Fdiv>\n                <div style=\"position: absolute; top: 19px; bottom: 24px; left: 7px; right: 7px; writing-mode: vertical-rl; font-family: 'Klee One', cursive; font-weight: 600; font-size: {{ pvFs }}px; line-height: 1.55; color: #33302a; overflow: hidden;\">{{ pvText }}<\u002Fdiv>\n                <div style=\"position: absolute; bottom: 5px; left: 0; right: 0; text-align: center; font-size: 8px; color: rgba(50,45,38,0.75); font-family: 'Klee One', cursive; white-space: nowrap; overflow: hidden;\">{{ pvName }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display: flex; justify-content: flex-end; gap: 12px; margin-top: 24px;\">\n            <button onclick=\"{{ closeForm }}\" style=\"padding: 11px 24px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.25); background: rgba(0,0,0,0); color: rgba(238,242,255,0.8); font-size: 14px; letter-spacing: 0.1em; cursor: pointer; font-family: 'Zen Kaku Gothic New', sans-serif;\" style-hover=\"background: rgba(255,255,255,0.08);\">やめる<\u002Fbutton>\n            <button onclick=\"{{ submit }}\" style=\"padding: 11px 32px; border-radius: 999px; border: none; background: var(--accent, #ffd98a); color: #241a08; font-size: 15px; font-weight: 700; letter-spacing: 0.15em; cursor: {{ submitCursor }}; opacity: {{ submitOpacity }}; font-family: 'Zen Kaku Gothic New', sans-serif; box-shadow: 0 6px 20px rgba(255,217,138,0.3); transition: all 0.2s;\" style-hover=\"box-shadow: 0 8px 28px rgba(255,217,138,0.5);\">笹に飾る<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- 短冊を読むモーダル -->\n  <sc-if value=\"{{ readOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ closeRead }}\" style=\"position: absolute; inset: 0; z-index: 40; cursor: pointer;\">\n      <div style=\"position: absolute; inset: 0; background: rgba(2,4,14,0.68); backdrop-filter: blur(6px); animation: fadeIn 0.3s ease;\"><\u002Fdiv>\n      <div style=\"position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px;\">\n        <div style=\"display: flex; flex-direction: column; align-items: center; animation: readIn 0.55s cubic-bezier(0.34, 1.4, 0.44, 1);\">\n          <div style=\"width: 1px; height: 7vh; background: rgba(255,240,200,0.5);\"><\u002Fdiv>\n          <div style=\"width: 232px; height: min(62vh, 560px); min-height: 360px; background: {{ selColor }}; border-radius: 3px; position: relative; box-shadow: 0 30px 90px rgba(0,0,0,0.65), 0 0 40px rgba(255,255,255,0.18), inset 0 0 40px rgba(255,255,255,0.3);\">\n            <div style=\"position: absolute; top: 16px; left: 50%; margin-left: -7px; width: 14px; height: 14px; border-radius: 50%; background: var(--sky0, #02040f); box-shadow: inset 0 0 0 2px rgba(0,0,0,0.25);\"><\u002Fdiv>\n            <div style=\"position: absolute; top: 50px; bottom: 58px; left: 22px; right: 22px; writing-mode: vertical-rl; font-family: 'Klee One', cursive; font-weight: 600; font-size: {{ selFs }}px; line-height: 1.7; color: #33302a; overflow: hidden;\">{{ selText }}<\u002Fdiv>\n            <div style=\"position: absolute; bottom: 18px; left: 0; right: 0; text-align: center; font-size: 14px; color: rgba(50,45,38,0.8); font-family: 'Klee One', cursive;\">{{ selName }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display: flex; flex-direction: column; align-items: center; gap: 10px; animation: fadeIn 0.6s ease 0.3s both;\">\n          <a href=\"{{ shareHref }}\" target=\"_blank\" rel=\"noopener\" style=\"font-size: 13px; letter-spacing: 0.12em; text-decoration: none; border: 1px solid var(--accent, #ffd98a); border-radius: 999px; padding: 9px 22px; background: rgba(8,12,30,0.55);\" style-hover=\"background: rgba(255,217,138,0.15);\">この願いをXでシェア<\u002Fa>\n          <div style=\"font-size: 11px; letter-spacing: 0.2em; color: rgba(238,242,255,0.55);\">画面をクリックで閉じる<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;theme&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;indigo&quot;, &quot;violet&quot;, &quot;sumi&quot;], &quot;default&quot;: &quot;indigo&quot;, &quot;tsType&quot;: &quot;'indigo' | 'violet' | 'sumi'&quot;, &quot;section&quot;: &quot;ビジュアル&quot; },\n  &quot;windStrength&quot;: { &quot;editor&quot;: &quot;range&quot;, &quot;min&quot;: 0, &quot;max&quot;: 2, &quot;step&quot;: 0.1, &quot;default&quot;: 1, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;ビジュアル&quot; },\n  &quot;soundOn&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;サウンド&quot; }\n}\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.sceneRef = React.createRef();\n    this.KEY = 'tanabata-wishes-v1';\n    let seed = 7;\n    const rnd = () => ((seed = (seed * 16807) % 2147483647) / 2147483647);\n    const stars = [];\n    for (let i = 0; i < 120; i++) {\n      stars.push({\n        x: +(rnd() * 100).toFixed(2), y: +(rnd() * 85).toFixed(2),\n        s: +(0.8 + rnd() * 2.1).toFixed(2), o: +(0.3 + rnd() * 0.65).toFixed(2),\n        t: +(2.2 + rnd() * 4.5).toFixed(2), d: +(rnd() * 6).toFixed(2)\n      });\n    }\n    for (let i = 0; i < 70; i++) {\n      const x = rnd() * 100;\n      const y = 30 - 0.34 * x + (rnd() - 0.5) * 14;\n      if (y < -2 || y > 62) continue;\n      stars.push({\n        x: +x.toFixed(2), y: +y.toFixed(2),\n        s: +(0.6 + rnd() * 1.3).toFixed(2), o: +(0.25 + rnd() * 0.5).toFixed(2),\n        t: +(2 + rnd() * 5).toFixed(2), d: +(rnd() * 6).toFixed(2)\n      });\n    }\n    this._stars = stars;\n    this._bg = this.mkClusters(10, 31, 1.35, 72)\n      .concat(this.mkClusters(6, 63, 1.5, 15))\n      .concat(this.mkClusters(6, 77, 1.5, 35))\n      .concat(this.mkClusters(5, 89, 1.4, 90));\n    this._mid = this.mkTreeClusters(32, 91, 1.0);\n    this._fg = this.mkTreeClusters(9, 57, 1.15);\n    const br = [];\n    let bsd = 41;\n    const brr = () => ((bsd = (bsd * 16807) % 2147483647) / 2147483647);\n    for (let i = 0; i < 14; i++) {\n      const side = i % 2 === 0 ? 1 : -1;\n      br.push({\n        y: +(6 + (i / 14) * 58 + brr() * 3).toFixed(1),\n        rot: Math.round(side === 1 ? -(38 + brr() * 32) : -(110 + brr() * 32)),\n        len: Math.round((90 + brr() * 150) * (1 - i / 40)),\n        dur: +(3 + brr() * 2).toFixed(2),\n        delay: +(-brr() * 3).toFixed(2)\n      });\n    }\n    this._branches = br;\n    const bokeh = [];\n    let bs = 21;\n    const brnd = () => ((bs = (bs * 16807) % 2147483647) / 2147483647);\n    const bcols = ['#cfe6ff', '#ffe9b0', '#ffc2e0', '#c9f4dd'];\n    for (let i = 0; i < 14; i++) {\n      const s = Math.round(4 + brnd() * 10);\n      const c = bcols[Math.floor(brnd() * bcols.length)];\n      bokeh.push({\n        x: +(brnd() * 100).toFixed(1), y: +(8 + brnd() * 80).toFixed(1),\n        s, c, glow: '0 0 ' + (s * 2) + 'px ' + Math.round(s * 0.7) + 'px ' + c + '3f',\n        dur: +(7 + brnd() * 9).toFixed(2), delay: +(-brnd() * 12).toFixed(2)\n      });\n    }\n    this._bokeh = bokeh;\n    let user = [];\n    try { user = JSON.parse(localStorage.getItem(this.KEY) || '[]') || []; } catch (e) { user = []; }\n    if (!Array.isArray(user)) user = [];\n    this.state = { user, formOpen: false, text: '', name: '', color: '#e2c37e', selected: null, newestId: null, theme: null, sound: null, spark: null };\n  }\n\n  mkClusters(n, seed0, baseScale, cx) {\n    let seed = seed0;\n    const rnd = () => ((seed = (seed * 16807) % 2147483647) / 2147483647);\n    const arr = [];\n    const g1s = ['#0d2a1e', '#122f23', '#173a2b', '#0a2018'];\n    const g2s = ['#245240', '#2c604a', '#356b52', '#3d7659'];\n    for (let i = 0; i < n; i++) {\n      const y = -4 + 60 * Math.pow(rnd(), 1.1);\n      const half = 5 + y * 0.28;\n      let x = (cx == null ? 72 : cx) + (rnd() * 2 - 1) * half;\n      if (x < 3) x = 3;\n      if (x > 98) x = 98;\n      const cnt = 6 + Math.floor(rnd() * 4);\n      const leaves = [];\n      for (let k = 0; k < cnt; k++) {\n        const ang = 18 + (k / Math.max(1, cnt - 1)) * 144 + (rnd() * 24 - 12);\n        const len = 26 + rnd() * 22;\n        leaves.push({\n          rot: Math.round(ang), len: Math.round(len), h: Math.max(4, Math.round(len * 0.14)),\n          g1: g1s[Math.floor(rnd() * g1s.length)], g2: g2s[Math.floor(rnd() * g2s.length)]\n        });\n      }\n      arr.push({\n        x: +x.toFixed(1), y: +y.toFixed(1),\n        scale: +(baseScale * (0.8 + rnd() * 0.5)).toFixed(2),\n        dur: +(2.2 + rnd() * 2.6).toFixed(2), delay: +(-rnd() * 3).toFixed(2),\n        leaves\n      });\n    }\n    return arr;\n  }\n\n  mkTreeClusters(n, seed0, baseScale) {\n    let seed = seed0;\n    const rnd = () => ((seed = (seed * 16807) % 2147483647) / 2147483647);\n    const g1s = ['#0d2a1e', '#122f23', '#173a2b', '#0a2018'];\n    const g2s = ['#245240', '#2c604a', '#356b52', '#3d7659'];\n    const arr = [];\n    for (let i = 0; i < n; i++) {\n      const bi = Math.floor(rnd() * 14);\n      const t = 0.3 + rnd() * 0.78;\n      const cnt = 5 + Math.floor(rnd() * 4);\n      const leaves = [];\n      for (let k = 0; k < cnt; k++) {\n        const ang = 18 + (k / Math.max(1, cnt - 1)) * 144 + (rnd() * 24 - 12);\n        const len = 26 + rnd() * 22;\n        leaves.push({\n          rot: Math.round(ang), len: Math.round(len), h: Math.max(4, Math.round(len * 0.14)),\n          g1: g1s[Math.floor(rnd() * g1s.length)], g2: g2s[Math.floor(rnd() * g2s.length)]\n        });\n      }\n      arr.push({\n        bi, t,\n        ox: Math.round(rnd() * 24 - 12), oy: Math.round(rnd() * 14 - 4),\n        scale: +(baseScale * (0.75 + rnd() * 0.5)).toFixed(2),\n        dur: +(2.2 + rnd() * 2.6).toFixed(2), delay: +(-rnd() * 3).toFixed(2),\n        leaves\n      });\n    }\n    return arr;\n  }\n\n  samples() {\n    const P = ['#7fbf9e', '#d98a96', '#e2c37e', '#7fb4d9', '#a98fd0', '#e8e4d8'];\n    return [\n      { id: 's1', text: '家族みんなが健康でいられますように', name: 'みゆき', color: P[5] },\n      { id: 's2', text: '世界一のパティシエになれますように', name: 'はると 8さい', color: P[2] },\n      { id: 's3', text: '宝くじが当たりますように', name: 'たけし', color: P[1] },\n      { id: 's4', text: 'ねこと会話できますように', name: 'ねこずき', color: P[0] },\n      { id: 's5', text: '志望校に合格しますように', name: 'さくら', color: P[4] },\n      { id: 's6', text: '毎日おいしいごはんが食べられますように', name: 'こはる', color: P[3] },\n      { id: 's7', text: '早起きできる人になりたい', name: 'よしお', color: P[0] },\n      { id: 's8', text: '織姫と彦星が今年も会えますように', name: 'ほしみ', color: P[4] },\n      { id: 's9', text: 'せかいが平和になりますように', name: 'けん', color: P[3] },\n      { id: 's10', text: '推しのライブに当選しますように', name: 'まりな', color: P[1] }\n    ];\n  }\n\n  anchorPts(W, H) {\n    const pts = [];\n    const bx = 0.72 * W;\n    const k = Math.max(0.7, Math.min(1.3, W / 1400));\n    this._branches.forEach((b) => {\n      const rad = b.rot * Math.PI / 180;\n      [1.0, 0.72, 0.45].forEach((t) => {\n        const x = Math.max(40, Math.min(Math.max(90, W - 50), bx + Math.cos(rad) * b.len * k * t));\n        const y = Math.max(H * 0.09, Math.min(H * 0.52, H * b.y / 100 + Math.sin(rad) * b.len * k * t));\n        pts.push({ x: Math.round(x), y: Math.round(y) });\n      });\n    });\n    return pts;\n  }\n\n  fitFont(len, w, h, maxF, minF) {\n    for (let f = maxF; f >= minF; f -= 0.5) {\n      const cols = Math.max(1, Math.floor(w / (f * 1.55)));\n      const rows = Math.max(1, Math.floor(h / (f * 1.12)));\n      if (cols * rows >= len) return f;\n    }\n    return minF;\n  }\n\n  fitText(text, w, h, maxF, minF) {\n    const len = Math.max(1, text.length);\n    const f = this.fitFont(len, w, h, maxF, minF);\n    const cols = Math.max(1, Math.floor(w / (f * 1.55)));\n    const rows = Math.max(1, Math.floor(h / (f * 1.12)));\n    const cap = cols * rows;\n    return { t: text.length > cap ? text.slice(0, Math.max(1, cap - 1)) + '…' : text, f };\n  }\n\n  themes() {\n    return {\n      indigo: { '--sky0': '#02040f', '--sky1': '#071030', '--sky2': '#12204d', '--glow': '#1c2c5e', '--mw': 'rgba(160,190,250,0.45)', '--neb1': 'rgba(90,85,200,0.22)', '--neb2': 'rgba(190,110,180,0.15)', '--accent': '#e9c987', '--accent2': '#93a8e8', '--panel': 'rgba(7,12,34,0.92)' },\n      violet: { '--sky0': '#0c041c', '--sky1': '#251048', '--sky2': '#4a2287', '--glow': '#6b3aa8', '--mw': 'rgba(240,190,255,0.55)', '--neb1': 'rgba(200,110,240,0.42)', '--neb2': 'rgba(255,130,190,0.3)', '--accent': '#ffc2e0', '--accent2': '#c9a6ff', '--panel': 'rgba(26,12,50,0.92)' },\n      sumi: { '--sky0': '#08080a', '--sky1': '#141418', '--sky2': '#1f1e22', '--glow': '#2b2820', '--mw': 'rgba(255,232,180,0.32)', '--neb1': 'rgba(230,200,130,0.16)', '--neb2': 'rgba(180,160,120,0.12)', '--accent': '#e8c56a', '--accent2': '#cfc6ae', '--panel': 'rgba(16,15,14,0.94)' }\n    };\n  }\n\n  curTheme() {\n    const t = this.state.theme || this.props.theme;\n    return this.themes()[t] ? t : 'indigo';\n  }\n\n  applyTheme() {\n    const el = this.sceneRef.current;\n    if (!el) return;\n    const t = this.themes()[this.curTheme()];\n    for (const k in t) el.style.setProperty(k, t[k]);\n    el.style.setProperty('--wind', String(this.props.windStrength == null ? 1 : this.props.windStrength));\n  }\n\n  componentDidMount() {\n    this.applyTheme();\n    this._unlock = () => {\n      window.removeEventListener('pointerdown', this._unlock);\n      this.ensureAudio();\n      this._amb = setInterval(() => { if (Math.random() < 0.55) this.chime('amb'); }, 16000);\n    };\n    window.addEventListener('pointerdown', this._unlock);\n    this._esc = (e) => { if (e.key === 'Escape') this.setState({ formOpen: false, selected: null }); };\n    window.addEventListener('keydown', this._esc);\n    const measure = () => {\n      const el = this.sceneRef.current;\n      if (el && el.clientWidth > 100 && el.clientHeight > 100) {\n        this.setState({ dims: { w: el.clientWidth, h: el.clientHeight } });\n      } else {\n        setTimeout(measure, 120);\n      }\n    };\n    measure();\n    this._onResize = measure;\n    window.addEventListener('resize', this._onResize);\n    this.initFirebase();\n  }\n\n  async initFirebase() {\n    try {\n      const appMod = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js');\n      const fs = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js');\n      const cfg = {\n        apiKey: 'AIzaSyAKQraY1SXGMX8wsE53T8-4NAHBETbem_8',\n        authDomain: 'tanabata-9092e.firebaseapp.com',\n        projectId: 'tanabata-9092e',\n        storageBucket: 'tanabata-9092e.firebasestorage.app',\n        messagingSenderId: '138265932800',\n        appId: '1:138265932800:web:ad189cdd1c4144c9f054e5'\n      };\n      const app = appMod.initializeApp(cfg);\n      const db = fs.getFirestore(app);\n      const col = fs.collection(db, 'wishes');\n      this._fb = { fs: fs, col: col };\n      const q = fs.query(col, fs.orderBy('ts', 'asc'), fs.limit(1000));\n      this._unsub = fs.onSnapshot(q, (snap) => {\n        const arr = [];\n        snap.forEach((doc) => {\n          const v = doc.data() || {};\n          arr.push({\n            id: doc.id,\n            text: String(v.text || ''),\n            name: String(v.name || ''),\n            color: v.color || '#e2c37e',\n            ts: (v.ts && v.ts.toMillis) ? v.ts.toMillis() : Date.now()\n          });\n        });\n        this._remoteOk = true;\n        try { localStorage.setItem(this.KEY, JSON.stringify(arr)); } catch (e) {}\n        this.setState({ user: arr });\n      }, (err) => {\n        this._remoteOk = false;\n        console.warn('Tanabata sync error — using local storage only', err);\n      });\n    } catch (e) {\n      console.warn('Firebase init failed — local storage only', e);\n    }\n  }\n\n  componentDidUpdate() { this.applyTheme(); }\n\n  componentWillUnmount() {\n    window.removeEventListener('pointerdown', this._unlock);\n    window.removeEventListener('keydown', this._esc);\n    window.removeEventListener('resize', this._onResize);\n    if (this._unsub) { try { this._unsub(); } catch (e) {} }\n    if (this._amb) clearInterval(this._amb);\n  }\n\n  ensureAudio() {\n    if (!this._audio) {\n      const AC = window.AudioContext || window.webkitAudioContext;\n      if (AC) this._audio = new AC();\n    }\n    if (this._audio && this._audio.state === 'suspended') this._audio.resume();\n    return this._audio;\n  }\n\n  soundOn() {\n    if (this.state.sound != null) return this.state.sound;\n    return this.props.soundOn == null ? true : !!this.props.soundOn;\n  }\n\n  noiseBuf(ctx) {\n    if (this._nb) return this._nb;\n    const b = ctx.createBuffer(1, Math.floor(ctx.sampleRate * 0.5), ctx.sampleRate);\n    const d = b.getChannelData(0);\n    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;\n    this._nb = b;\n    return b;\n  }\n\n  rustleMove = () => {\n    if (!this.soundOn()) return;\n    const ctx = this._audio;\n    if (!ctx || ctx.state !== 'running') return;\n    const now = ctx.currentTime;\n    if (now - (this._lr || 0) < 0.3) return;\n    this._lr = now;\n    const src = ctx.createBufferSource();\n    src.buffer = this.noiseBuf(ctx);\n    src.playbackRate.value = 0.7 + Math.random() * 0.6;\n    const bp = ctx.createBiquadFilter();\n    bp.type = 'bandpass';\n    bp.frequency.value = 2200 + Math.random() * 2800;\n    bp.Q.value = 0.7;\n    const g = ctx.createGain();\n    const dur = 0.3 + Math.random() * 0.25;\n    g.gain.setValueAtTime(0.0001, now);\n    g.gain.exponentialRampToValueAtTime(0.02 + Math.random() * 0.015, now + 0.05);\n    g.gain.exponentialRampToValueAtTime(0.0001, now + dur);\n    src.connect(bp); bp.connect(g); g.connect(ctx.destination);\n    src.start(now); src.stop(now + dur + 0.05);\n  };\n\n  bell(f, t, vol) {\n    const ctx = this._audio;\n    const mk = (freq, v, dec) => {\n      const o = ctx.createOscillator(), g = ctx.createGain();\n      o.type = 'sine';\n      o.frequency.value = freq * (1 + (Math.random() - 0.5) * 0.004);\n      g.gain.setValueAtTime(0.0001, t);\n      g.gain.exponentialRampToValueAtTime(v, t + 0.012);\n      g.gain.exponentialRampToValueAtTime(0.0001, t + dec);\n      o.connect(g); g.connect(ctx.destination);\n      o.start(t); o.stop(t + dec + 0.1);\n    };\n    mk(f, vol, 2.2); mk(f * 2.76, vol * 0.22, 0.9); mk(f * 5.4, vol * 0.08, 0.4);\n  }\n\n  chime(kind) {\n    if (!this.soundOn()) return;\n    const ctx = this.ensureAudio();\n    if (!ctx) return;\n    const now = ctx.currentTime;\n    if (kind === 'add') {\n      [1318.5, 1568, 2093].forEach((f, i) => this.bell(f, now + i * 0.14, 0.07));\n    } else if (kind === 'read') {\n      this.bell(1568, now, 0.05);\n    } else {\n      const pent = [1046.5, 1174.7, 1318.5, 1568, 1760];\n      this.bell(pent[Math.floor(Math.random() * pent.length)], now, 0.028);\n    }\n  }\n\n  burst(x, y) {\n    const id = Date.now();\n    const parts = [];\n    for (let i = 0; i < 10; i++) {\n      const a = (i / 10) * Math.PI * 2;\n      parts.push({ dx: Math.round(Math.cos(a) * (44 + (i % 3) * 18)), dy: Math.round(Math.sin(a) * (40 + (i % 3) * 14)), d: +(i * 0.03).toFixed(2) });\n    }\n    this.setState({ spark: { x, y, parts, id } });\n    setTimeout(() => {\n      if (this.state.spark && this.state.spark.id === id) this.setState({ spark: null });\n    }, 1800);\n  }\n\n  submit = async () => {\n    const text = this.state.text.trim();\n    if (!text) return;\n    const rec = { text, name: this.state.name.trim(), color: this.state.color };\n    this.setState({ formOpen: false, text: '', name: '' });\n    this.chime('add');\n    this.burst(72, 30);\n    if (this._fb && this._remoteOk) {\n      try {\n        const fs = this._fb.fs;\n        const ref = await fs.addDoc(this._fb.col, {\n          text: rec.text, name: rec.name, color: rec.color, ts: fs.serverTimestamp()\n        });\n        this.setState({ newestId: ref.id });\n        return;\n      } catch (e) { console.warn('Remote add failed — saving locally', e); }\n    }\n    const full = Object.assign({ id: 'u' + Date.now(), ts: Date.now() }, rec);\n    const user = this.state.user.concat([full]);\n    try { localStorage.setItem(this.KEY, JSON.stringify(user)); } catch (e) {}\n    this.setState({ user, newestId: full.id });\n  };\n\n  renderVals() {\n    const dims = this.state.dims && this.state.dims.w > 100 && this.state.dims.h > 100 ? this.state.dims : { w: 1280, h: 800 };\n    const all = this.samples().concat(this.state.user);\n    const live = {};\n    const small = dims.w < 1100;\n    const pw = small ? 46 : 56;\n    const ph = small ? 126 : 150;\n    const cand = this.anchorPts(dims.w, dims.h);\n    const chosenPts = [];\n    all.forEach(() => {\n      let best = cand[0], bestScore = -1;\n      cand.forEach((pt) => {\n        let dmin = 1e9;\n        chosenPts.forEach((q) => {\n          const d = Math.abs(pt.x - q.x) * 2 + Math.abs(pt.y - q.y) * 0.5;\n          if (d < dmin) dmin = d;\n        });\n        if (dmin > bestScore) { bestScore = dmin; best = pt; }\n      });\n      chosenPts.push(best);\n    });\n    const wishes = all.map((rec, i) => {\n      const a = chosenPts[i];\n      const isNew = rec.id === this.state.newestId;\n      live[rec.id] = true;\n      const dur = (2.6 + ((i * 31) % 15) / 10).toFixed(2);\n      const delay = (-((i * 17) % 37) / 10).toFixed(2);\n      const fit = this.fitText(rec.text, pw - 14, ph - 40, 13, 6);\n      return {\n        x: a.x, y: a.y, len: 16, pw, ph, mh: -Math.round(pw / 2),\n        anim: isNew ? 'tzdrop 1.4s cubic-bezier(0.3, 1, 0.45, 1) both' : 'none',\n        anim2: isNew\n          ? 'tzsway ' + dur + 's ease-in-out 1.4s infinite alternate'\n          : 'tzsway ' + dur + 's ease-in-out ' + delay + 's infinite alternate',\n        color: rec.color, short: fit.t, fs: fit.f, name: rec.name || '',\n        open: () => { this.chime('read'); this.setState({ selected: rec }); }\n      };\n    });\n    const brs = this._branches;\n    const kb = Math.max(0.7, Math.min(1.3, dims.w / 1400));\n    const posOf = (c) => {\n      const b = brs[c.bi % brs.length];\n      const rad = b.rot * Math.PI / 180;\n      return {\n        x: Math.round(0.72 * dims.w + Math.cos(rad) * b.len * kb * c.t + c.ox),\n        y: Math.round(dims.h * b.y / 100 + Math.sin(rad) * b.len * kb * c.t + c.oy)\n      };\n    };\n    const midClusters = this._mid.map((c) => Object.assign({}, c, posOf(c)));\n    const fgClusters = this._fg.map((c) => Object.assign({}, c, posOf(c)));\n    const palette = [\n      { hex: '#7fbf9e', label: '緑' }, { hex: '#d98a96', label: '紅' }, { hex: '#e2c37e', label: '黄' },\n      { hex: '#7fb4d9', label: '空' }, { hex: '#a98fd0', label: '紫' }, { hex: '#e8e4d8', label: '白' }\n    ];\n    const colors = palette.map(c => ({\n      hex: c.hex, label: c.label,\n      pick: () => this.setState({ color: c.hex }),\n      ring: this.state.color === c.hex ? '0 0 0 2.5px rgba(255,235,180,0.95)' : '0 0 0 1px rgba(255,255,255,0.28)'\n    }));\n    const cur = this.curTheme();\n    const themesList = [\n      { key: 'indigo', label: '藍の夜', swatch: 'linear-gradient(135deg, #0b1747, #4360c0)' },\n      { key: 'violet', label: '紫の夜', swatch: 'linear-gradient(135deg, #2a1152, #8b5cc9)' },\n      { key: 'sumi', label: '墨と金', swatch: 'linear-gradient(135deg, #141416, #c9a44a)' }\n    ].map(t => ({\n      key: t.key, label: t.label, swatch: t.swatch,\n      pick: () => this.setState({ theme: t.key }),\n      border: cur === t.key ? '2px solid rgba(255,235,180,0.95)' : '2px solid rgba(255,255,255,0.22)'\n    }));\n    const sel = this.state.selected;\n    const canSubmit = this.state.text.trim().length > 0;\n    const pvSrc = this.state.text.trim() || 'ねがいごとをかいてね';\n    const pvFit = this.fitText(pvSrc, 44, 118, 12, 6);\n    let selFs = 24, selText = '';\n    if (sel) {\n      const h = Math.min((window.innerHeight || 800) * 0.62, 560) - 108;\n      const sfit = this.fitText(sel.text, 188, Math.max(220, h), 30, 9);\n      selFs = sfit.f;\n      selText = sfit.t;\n    }\n    const sp = this.state.spark;\n    const sparkleBurst = sp ? React.createElement('div',\n      { key: sp.id, style: { position: 'absolute', left: sp.x + '%', top: sp.y + '%', zIndex: 25, pointerEvents: 'none' } },\n      sp.parts.map((p, i) => React.createElement('div', {\n        key: i,\n        style: {\n          position: 'absolute', width: '6px', height: '6px', borderRadius: '50%',\n          background: '#ffe9b0', boxShadow: '0 0 12px 3px rgba(255,220,140,0.8)',\n          '--dx': p.dx + 'px', '--dy': p.dy + 'px',\n          animation: 'spark 1s ease-out ' + p.d + 's both'\n        }\n      }))\n    ) : null;\n    return {\n      sceneRef: this.sceneRef, stars: this._stars, bokeh: this._bokeh,\n      bgClusters: this._bg, midClusters, fgClusters,\n      branches: this._branches.map((b) => Object.assign({}, b, { len: Math.round(b.len * kb) })),\n      rustleMove: this.rustleMove,\n      wishes,\n      countLabel: all.length + '枚の願いが飾られています',\n      formOpen: this.state.formOpen, readOpen: !!sel,\n      openForm: () => this.setState({ formOpen: true }),\n      closeForm: () => this.setState({ formOpen: false }),\n      text: this.state.text, name: this.state.name,\n      charCount: this.state.text.length + ' / 240',\n      setText: (e) => this.setState({ text: e.target.value }),\n      setName: (e) => this.setState({ name: e.target.value }),\n      colors,\n      pvColor: this.state.color,\n      pvText: pvFit.t, pvFs: pvFit.f,\n      pvName: this.state.name,\n      submit: this.submit,\n      submitOpacity: canSubmit ? 1 : 0.4,\n      submitCursor: canSubmit ? 'pointer' : 'not-allowed',\n      selColor: sel ? sel.color : '#e2c37e',\n      selText, selFs,\n      selName: sel && sel.name ? '― ' + sel.name : '',\n      closeRead: () => this.setState({ selected: null }),\n      shareHref: sel ? 'https://twitter.com/intent/tweet?text=' + encodeURIComponent('「' + sel.text + '」 #七夕の願い #星に願いを') : '#',\n      toggleSound: () => {\n        const on = !this.soundOn();\n        this.setState({ sound: on });\n        if (on) { this.ensureAudio(); this.chime('read'); }\n      },\n      soundOpacity: this.soundOn() ? 1 : 0.35,\n      soundTitle: this.soundOn() ? '音を消す' : '音を出す',\n      themesList, sparkleBurst\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
