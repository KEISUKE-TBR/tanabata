document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"5096cb89-f252-4133-ad02-85e85cf7b064\"><\u002Fscript>\n\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin=\"\">\n<script>(function () { var l = document.createElement('link'); l.rel = 'stylesheet'; l.href = 'https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@400;600;700&family=Klee+One:wght@400;600&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap'; document.head.appendChild(l); })();<\u002Fscript>\n<style>\nhtml, body { margin: 0; padding: 0; background: #02040f; }\na { color: #ffd98a; } a:hover { color: #ffe9b8; }\n@keyframes twinkle { 0%, 100% { opacity: 0.15; } 50% { opacity: 1; } }\n@keyframes tzsway { from { transform: rotate(calc(var(--wind, 1) * -3deg)); } to { transform: rotate(calc(var(--wind, 1) * 3deg)); } }\n@keyframes tzdrop { 0% { transform: translateY(46vh); opacity: 0; } 50% { opacity: 1; } 78% { transform: translateY(-12px); } 100% { transform: translateY(0); opacity: 1; } }\n@keyframes stalk { from { transform: rotate(calc(var(--wind, 1) * -0.6deg + var(--lean, 0deg))); } to { transform: rotate(calc(var(--wind, 1) * 0.9deg + var(--lean, 0deg))); } }\n@keyframes leaves { from { transform: rotate(calc(var(--wind, 1) * -3.5deg)); } to { transform: rotate(calc(var(--wind, 1) * 3deg)); } }\n@keyframes shoot { 0% { transform: translate(0, 0) rotate(-32deg); opacity: 0; } 1.5% { opacity: 1; } 7% { transform: translate(-46vw, 28vh) rotate(-32deg); opacity: 0; } 100% { transform: translate(-46vw, 28vh) rotate(-32deg); opacity: 0; } }\n@keyframes bokeh { 0% { transform: translate(0, 0); opacity: 0; } 30% { opacity: 0.9; } 70% { opacity: 0.5; } 100% { transform: translate(-26px, -64px); opacity: 0; } }\n@keyframes popIn { from { transform: scale(0.92) translateY(16px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }\n@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }\n@keyframes readIn { 0% { transform: scale(0.5) rotate(7deg); opacity: 0; } 60% { transform: scale(1.04) rotate(-2deg); opacity: 1; } 100% { transform: scale(1) rotate(0deg); opacity: 1; } }\n@keyframes spark { from { transform: translate(0, 0) scale(1); opacity: 1; } to { transform: translate(var(--dx, 30px), var(--dy, -30px)) scale(0.15); opacity: 0; } }\n<\u002Fstyle>\n<\u002Fhelmet>\n<div ref=\"{{ sceneRef }}\" style=\"position: relative; width: 100%; height: 100dvh; min-height: 560px; overflow: hidden; background: linear-gradient(180deg, var(--sky0, #02040f) 0%, var(--sky1, #071030) 42%, var(--sky2, #12204d) 76%, var(--glow, #1c2c5e) 100%); font-family: 'Zen Kaku Gothic New', sans-serif; color: #eef2ff\">\n\n  <!-- 空レイヤー(視差) -->\n  <div style=\"position: absolute; inset: 0; pointer-events: none; transform: translate3d(var(--pxA, 0px), var(--pyA, 0px), 0); transition: transform 0.15s linear\">\n  <!-- 星雲 -->\n  <div style=\"position: absolute; left: 14%; top: 20%; width: 46%; height: 48%; background: radial-gradient(closest-side, var(--neb1, rgba(110,100,230,0.4)), rgba(0,0,0,0) 72%); filter: blur(34px); pointer-events: none;\"><\u002Fdiv>\n  <div style=\"position: absolute; left: 28%; top: 34%; width: 32%; height: 36%; background: radial-gradient(closest-side, var(--neb2, rgba(230,120,210,0.28)), rgba(0,0,0,0) 70%); filter: blur(28px); pointer-events: none;\"><\u002Fdiv>\n  <div style=\"position: absolute; left: 36%; top: 40%; width: 16%; height: 18%; background: radial-gradient(closest-side, rgba(255,255,255,0.16), rgba(0,0,0,0) 70%); filter: blur(18px); pointer-events: none;\"><\u002Fdiv>\n\n  <!-- 天の川 -->\n  <div style=\"position: absolute; left: -22%; top: 4%; width: 150%; height: 34%; transform: rotate(23deg); background: linear-gradient(180deg, rgba(0,0,0,0), var(--mw, rgba(170,200,255,0.6)), rgba(0,0,0,0)); opacity: 0.28; filter: blur(32px); pointer-events: none;\"><\u002Fdiv>\n  <div style=\"position: absolute; left: -22%; top: 13%; width: 150%; height: 11%; transform: rotate(23deg); background: linear-gradient(180deg, rgba(0,0,0,0), var(--mw, rgba(170,200,255,0.6)), rgba(0,0,0,0)); opacity: 0.42; filter: blur(15px); pointer-events: none;\"><\u002Fdiv>\n\n  <!-- 星 -->\n  <sc-for list=\"{{ stars }}\" as=\"st\" hint-placeholder-count=\"8\">\n    <div style=\"position: absolute; left: {{ st.x }}%; top: {{ st.y }}%; width: {{ st.s }}px; height: {{ st.s }}px; border-radius: 50%; background: #ffffff; opacity: {{ st.o }}; animation: twinkle {{ st.t }}s ease-in-out {{ st.d }}s infinite; pointer-events: none;\"><\u002Fdiv>\n  <\u002Fsc-for>\n\n  <!-- 流れ星 -->\n  <div style=\"position: absolute; left: 60%; top: 12%; width: 150px; height: 2px; border-radius: 2px; background: linear-gradient(90deg, #ffffff, rgba(255,255,255,0)); opacity: 0; animation: shoot 11s linear 3s infinite; pointer-events: none;\"><\u002Fdiv>\n  <div style=\"position: absolute; left: 44%; top: 5%; width: 110px; height: 2px; border-radius: 2px; background: linear-gradient(90deg, #ffffff, rgba(255,255,255,0)); opacity: 0; animation: shoot 17s linear 9s infinite; pointer-events: none;\"><\u002Fdiv>\n  <div style=\"position: absolute; left: 70%; top: 32%; width: 90px; height: 2px; border-radius: 2px; background: linear-gradient(90deg, #ffffff, rgba(255,255,255,0)); opacity: 0; animation: shoot 23s linear 15s infinite; pointer-events: none;\"><\u002Fdiv>\n\n  <!-- 光の粒(蛍・ぼかし玉) -->\n  <sc-for list=\"{{ bokeh }}\" as=\"b\" hint-placeholder-count=\"4\">\n    <div style=\"position: absolute; left: {{ b.x }}%; top: {{ b.y }}%; width: {{ b.s }}px; height: {{ b.s }}px; border-radius: 50%; background: {{ b.c }}; box-shadow: {{ b.glow }}; filter: blur(1px); opacity: 0; animation: bokeh {{ b.dur }}s ease-in-out {{ b.delay }}s infinite; pointer-events: none;\"><\u002Fdiv>\n  <\u002Fsc-for>\n  <\u002Fdiv>\n\n  <!-- 中景レイヤー(視差) -->\n  <div style=\"position: absolute; inset: 0; pointer-events: none; z-index: 2; transform: translate3d(var(--pxB, 0px), var(--pyB, 0px), 0); transition: transform 0.15s linear\">\n  <!-- 左のぼかし笹(短冊つき) -->\n  <div style=\"position: absolute; inset: 0; filter: blur(3px) brightness(0.55); opacity: 0.85;\">\n    <sc-for list=\"{{ leftTrunkSegs }}\" as=\"sg\" hint-placeholder-count=\"5\">\n      <div style=\"position: absolute; left: {{ sg.x }}px; top: {{ sg.y }}px; width: {{ sg.len }}px; height: {{ sg.w }}px; margin-top: {{ sg.mt }}px; transform: rotate({{ sg.rot }}deg); transform-origin: left center; border-radius: 3px; border-left: 2px solid rgba(4,14,9,0.6); background: linear-gradient(180deg, #4c8a63, #2f6645 52%, #0e2418);\"><\u002Fdiv>\n    <\u002Fsc-for>\n    <sc-for list=\"{{ leftBranches }}\" as=\"br\" hint-placeholder-count=\"4\">\n      <div style=\"position: absolute; left: {{ br.x }}px; top: {{ br.y }}px; width: {{ br.len }}px; height: 2px; margin-top: -1px; border-radius: 2px; background: linear-gradient(90deg, #35704c, #163a29 92%, rgba(22,58,41,0)); transform: rotate({{ br.rot }}deg); transform-origin: left center; animation: leaves {{ br.dur }}s ease-in-out {{ br.delay }}s infinite alternate;\"><\u002Fdiv>\n    <\u002Fsc-for>\n    <sc-for list=\"{{ leftClusters }}\" as=\"cl\" hint-placeholder-count=\"4\">\n      <div style=\"position: absolute; left: {{ cl.x }}px; top: {{ cl.y }}px; width: 150px; height: 110px; margin-left: -75px; margin-top: -55px; transform: scale({{ cl.scale }});\">\n        <div style=\"position: absolute; inset: 0; transform-origin: 60% 30%; animation: leaves {{ cl.dur }}s ease-in-out {{ cl.delay }}s infinite alternate;\">\n          <sc-for list=\"{{ cl.leaves }}\" as=\"lf\" hint-placeholder-count=\"3\">\n            <div style=\"position: absolute; left: 72px; top: 40px; width: {{ lf.len }}px; height: {{ lf.h }}px; border-radius: 0 100% 0 100%; background: linear-gradient(90deg, {{ lf.g1 }}, {{ lf.g2 }}); transform: rotate({{ lf.rot }}deg); transform-origin: left center;\"><\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n    <sc-for list=\"{{ leftTanzaku }}\" as=\"bt\" hint-placeholder-count=\"5\">\n      <div style=\"position: absolute; left: {{ bt.x }}px; top: {{ bt.y }}px; opacity: {{ bt.op }}; transform-origin: top center; animation: tzsway {{ bt.dur }}s ease-in-out {{ bt.delay }}s infinite alternate;\">\n        <div style=\"display: flex; flex-direction: column; align-items: center;\">\n          <div style=\"width: 1px; height: 8px; background: rgba(255,240,200,0.5);\"><\u002Fdiv>\n          <div style=\"width: {{ bt.w }}px; height: {{ bt.h }}px; background: {{ bt.color }}; border-radius: 2px;\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- 七夕笹の木(奥の2本目の幹) -->\n  <sc-for list=\"{{ trunkSegs2 }}\" as=\"sg\" hint-placeholder-count=\"5\">\n    <div style=\"position: absolute; left: {{ sg.x }}px; top: {{ sg.y }}px; width: {{ sg.len }}px; height: {{ sg.w }}px; margin-top: {{ sg.mt }}px; transform: rotate({{ sg.rot }}deg); transform-origin: left center; border-radius: 4px; border-left: 2px solid rgba(4,14,9,0.6); background: linear-gradient(180deg, #3d7355, #234d38 52%, #0a1c12); z-index: 3;\"><\u002Fdiv>\n  <\u002Fsc-for>\n  <!-- 七夕笹の木(右下から中央へしなる幹) -->\n  <sc-for list=\"{{ trunkSegs }}\" as=\"sg\" hint-placeholder-count=\"6\">\n    <div style=\"position: absolute; left: {{ sg.x }}px; top: {{ sg.y }}px; width: {{ sg.len }}px; height: {{ sg.w }}px; margin-top: {{ sg.mt }}px; transform: rotate({{ sg.rot }}deg); transform-origin: left center; border-radius: 4px; border-left: 3px solid rgba(4,14,9,0.65); background: linear-gradient(180deg, #5c9c74, #2f6645 52%, #0e2418); box-shadow: 0 3px 10px rgba(0,0,0,0.35); z-index: 3;\"><\u002Fdiv>\n  <\u002Fsc-for>\n  <!-- 枝 -->\n  <sc-for list=\"{{ branches }}\" as=\"br\" hint-placeholder-count=\"4\">\n    <div style=\"position: absolute; left: {{ br.x }}px; top: {{ br.y }}px; width: {{ br.len }}px; height: 2px; margin-top: -1px; border-radius: 2px; opacity: 0.85; background: linear-gradient(90deg, #2a5a3e, #12301f 92%, rgba(18,48,31,0)); transform: rotate({{ br.rot }}deg); transform-origin: left center; animation: leaves {{ br.dur }}s ease-in-out {{ br.delay }}s infinite alternate; z-index: 3;\"><\u002Fdiv>\n  <\u002Fsc-for>\n\n  <!-- 笹の葉(中景・カーソルでもしゃもしゃ) -->\n  <sc-for list=\"{{ midClusters }}\" as=\"cl\" hint-placeholder-count=\"4\">\n    <div onmousemove=\"{{ rustleMove }}\" style=\"position: absolute; left: {{ cl.x }}px; top: {{ cl.y }}px; width: 150px; height: 110px; margin-left: -75px; margin-top: -55px; z-index: 4; transform: scale({{ cl.scale }});\">\n      <div style=\"position: absolute; inset: 0; transform-origin: 60% 30%; animation: leaves {{ cl.dur }}s ease-in-out {{ cl.delay }}s infinite alternate;\" style-hover=\"animation-duration: 1.1s;\">\n        <sc-for list=\"{{ cl.leaves }}\" as=\"lf\" hint-placeholder-count=\"3\">\n          <div style=\"position: absolute; left: 72px; top: 40px; width: {{ lf.len }}px; height: {{ lf.h }}px; border-radius: 0 100% 0 100%; background: linear-gradient(90deg, {{ lf.g1 }}, {{ lf.g2 }}); transform: rotate({{ lf.rot }}deg); transform-origin: left center; box-shadow: 0 1px 4px rgba(0,0,0,0.35)\"><\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-for>\n\n  <!-- 短冊 -->\n  <sc-for list=\"{{ wishes }}\" as=\"w\" hint-placeholder-count=\"5\">\n    <div style=\"position: absolute; left: {{ w.x }}px; top: {{ w.y }}px; margin-left: {{ w.mh }}px; animation: {{ w.anim }}; z-index: 5;\">\n      <div style=\"transform-origin: top center; animation: {{ w.anim2 }};\">\n      <div style=\"display: flex; flex-direction: column; align-items: center;\">\n        <div style=\"width: 5px; height: 5px; border-radius: 50%; background: #2f5f43; margin-bottom: -2px; box-shadow: 0 0 4px rgba(0,0,0,0.5);\"><\u002Fdiv>\n        <div style=\"width: 1px; height: {{ w.len }}px; background: rgba(255,240,200,0.5);\"><\u002Fdiv>\n        <div onclick=\"{{ w.open }}\" role=\"button\" tabindex=\"0\" style=\"cursor: pointer; width: {{ w.pw }}px; height: {{ w.ph }}px; background: {{ w.color }}; border-radius: 2px; position: relative; box-shadow: 0 6px 16px rgba(0,0,0,0.5), 0 0 14px rgba(255,255,255,0.1), inset 0 0 16px rgba(255,255,255,0.18); transition: filter 0.25s;\" style-hover=\"filter: brightness(1.2) saturate(1.15) drop-shadow(0 0 14px rgba(255,255,255,0.5));\">\n          <div style=\"position: absolute; top: 6px; left: 50%; margin-left: -3.5px; width: 7px; height: 7px; border-radius: 50%; background: var(--sky1, #071030); box-shadow: inset 0 0 0 1.5px rgba(0,0,0,0.25);\"><\u002Fdiv>\n          <div style=\"position: absolute; top: 18px; bottom: 22px; left: 7px; right: 7px; writing-mode: vertical-rl; font-family: 'Klee One', cursive; font-weight: 600; font-size: {{ w.fs }}px; line-height: 1.55; color: #33302a; overflow: hidden;\">{{ w.short }}<\u002Fdiv>\n          <div style=\"position: absolute; bottom: 5px; left: 0; right: 0; text-align: center; font-size: 8px; color: rgba(50,45,38,0.75); font-family: 'Klee One', cursive; white-space: nowrap; overflow: hidden;\">{{ w.name }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-for>\n\n  <!-- 笹の葉(前景シルエット) -->\n  <div style=\"position: absolute; inset: 0; pointer-events: none; z-index: 6;\">\n  <sc-for list=\"{{ fgClusters }}\" as=\"cl\" hint-placeholder-count=\"3\">\n    <div style=\"position: absolute; left: {{ cl.x }}px; top: {{ cl.y }}px; width: 150px; height: 110px; margin-left: -75px; margin-top: -55px; z-index: 6; transform: scale({{ cl.scale }}); filter: brightness(0.72); pointer-events: none;\">\n      <div style=\"position: absolute; inset: 0; transform-origin: 60% 30%; animation: leaves {{ cl.dur }}s ease-in-out {{ cl.delay }}s infinite alternate;\">\n        <sc-for list=\"{{ cl.leaves }}\" as=\"lf\" hint-placeholder-count=\"3\">\n          <div style=\"position: absolute; left: 72px; top: 40px; width: {{ lf.len }}px; height: {{ lf.h }}px; border-radius: 0 100% 0 100%; background: linear-gradient(90deg, {{ lf.g1 }}, {{ lf.g2 }}); transform: rotate({{ lf.rot }}deg); transform-origin: left center;\"><\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-for>\n  <\u002Fdiv>\n\n  {{ sparkleBurst }}\n\n  <!-- 地面の霞 -->\n  <div style=\"position: absolute; left: 0; right: 0; bottom: 0; height: 20%; background: linear-gradient(180deg, rgba(3,5,22,0) 0%, rgba(5,9,30,0.55) 60%, rgba(3,5,20,0.88) 100%); pointer-events: none; z-index: 8\"><\u002Fdiv>\n\n  <!-- タイトル(左・縦書き) -->\n  <div style=\"position: absolute; top: 6%; left: 4.5%; z-index: 9; pointer-events: none; display: flex; flex-direction: row-reverse; gap: 20px; align-items: flex-start\">\n    <div style=\"writing-mode: vertical-rl; font-family: 'Zen Old Mincho', serif; font-size: clamp(19px, 2.2vw, 28px); font-weight: 700; letter-spacing: 0.24em; color: #fdf6e3; text-shadow: 0 0 10px rgba(4,8,26,0.95), 0 0 22px rgba(4,8,26,0.9), 0 2px 6px rgba(0,0,0,0.9);\">星に願いを<\u002Fdiv>\n    <div style=\"display: {{ subDisplay }}; writing-mode: vertical-rl; margin-top: 10px; font-size: 11px; letter-spacing: 0.3em; line-height: 2; color: #d7e0ff; text-shadow: 0 0 8px rgba(4,8,26,0.95), 0 0 16px rgba(4,8,26,0.9), 0 1px 4px rgba(0,0,0,0.9);\">七月七日 ― 笹にかくれた短冊をみつけて、読んでみよう<\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- 右上コントロール -->\n  <div style=\"position: absolute; top: 18px; right: 18px; display: flex; align-items: center; gap: 16px; z-index: 20\">\n    <button onclick=\"{{ toggleSound }}\" title=\"{{ soundTitle }}\" style=\"width: 34px; height: 34px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.3); background: rgba(8,12,30,0.5); color: #eef2ff; cursor: pointer; opacity: {{ soundOpacity }}; font-size: 15px; line-height: 1;\">♪<\u002Fbutton>\n  <\u002Fdiv>\n\n  <!-- 下部 -->\n  <div style=\"position: absolute; bottom: calc(4.5% + 72px); left: 0; right: 0; text-align: center; font-size: 12px; letter-spacing: 0.2em; color: rgba(238,242,255,0.7); pointer-events: none; z-index: 15; text-shadow: 0 1px 6px rgba(0,0,0,0.7)\">{{ countLabel }}<\u002Fdiv>\n  <sc-if value=\"{{ moreVisible }}\" hint-placeholder-val=\"{{ false }}\">\n    <button onclick=\"{{ shuffleMore }}\" style=\"position: absolute; left: 50%; transform: translateX(-50%); bottom: calc(4.5% + 98px); padding: 8px 20px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.28); background: rgba(8,12,30,0.5); color: rgba(238,242,255,0.85); font-size: 12px; letter-spacing: 0.18em; cursor: pointer; white-space: nowrap; backdrop-filter: blur(6px); z-index: 15; transition: all 0.25s;\" style-hover=\"background: rgba(255,255,255,0.12);\">みんなの願いをもっと見る<\u002Fbutton>\n  <\u002Fsc-if>\n  <button onclick=\"{{ openForm }}\" style=\"position: absolute; left: 50%; transform: translateX(-50%); bottom: 4.5%; padding: {{ ctaPad }}; border-radius: 999px; border: 1px solid var(--accent, #ffd98a); background: rgba(8,12,30,0.55); color: var(--accent, #ffd98a); font-size: {{ ctaFs }}px; font-family: 'Zen Old Mincho', serif; letter-spacing: 0.3em; text-indent: 0.3em; cursor: pointer; white-space: nowrap; backdrop-filter: blur(6px); box-shadow: 0 0 26px rgba(255,217,138,0.18); z-index: 15; transition: all 0.25s\" style-hover=\"background: rgba(255,217,138,0.16); box-shadow: 0 0 38px rgba(255,217,138,0.4);\">短冊に願いを書く<\u002Fbutton>\n\n  <!-- 願いを書くフォーム -->\n  <sc-if value=\"{{ formOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position: absolute; inset: 0; z-index: 30;\">\n      <div onclick=\"{{ closeForm }}\" style=\"position: absolute; inset: 0; background: rgba(2,4,14,0.62); backdrop-filter: blur(5px); animation: fadeIn 0.3s ease;\"><\u002Fdiv>\n      <div style=\"position: absolute; inset: 0; display: grid; place-items: center; pointer-events: none;\">\n        <div style=\"pointer-events: auto; width: min(92vw, 580px); max-height: 88vh; overflow: auto; background: var(--panel, rgba(10,16,44,0.92)); border: 1px solid rgba(255,255,255,0.14); border-radius: 18px; padding: 28px 30px; backdrop-filter: blur(16px); box-shadow: 0 30px 80px rgba(0,0,0,0.6); animation: popIn 0.35s cubic-bezier(0.3, 1.2, 0.4, 1);\">\n          <div style=\"font-family: 'Zen Old Mincho', serif; font-size: 22px; letter-spacing: 0.2em; color: #f5ecd8; margin-bottom: 20px;\">短冊に願いを書く<\u002Fdiv>\n          <div style=\"display: flex; gap: 26px; flex-wrap: wrap;\">\n            <div style=\"flex: 1; min-width: 240px; display: flex; flex-direction: column; gap: 14px;\">\n              <div style=\"display: flex; flex-direction: column; gap: 6px;\">\n                <div style=\"display: flex; justify-content: space-between; align-items: baseline;\">\n                  <label style=\"font-size: 12px; letter-spacing: 0.15em; color: var(--accent2, #a8bcff);\">ねがいごと<\u002Flabel>\n                  <span style=\"font-size: 11px; color: rgba(238,242,255,0.5);\">{{ charCount }}<\u002Fspan>\n                <\u002Fdiv>\n                <textarea value=\"{{ text }}\" onchange=\"{{ setText }}\" maxlength=\"240\" rows=\"5\" placeholder=\"ねがいごとを書いてください(240文字まで)\" style=\"resize: none; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.18); border-radius: 10px; color: #eef2ff; padding: 12px; font-family: 'Klee One', cursive; font-size: 16px; line-height: 1.6;\" style-focus=\"border-color: var(--accent, #ffd98a); outline: none; box-shadow: 0 0 0 3px rgba(255,217,138,0.15);\"><\u002Ftextarea>\n              <\u002Fdiv>\n              <div style=\"display: flex; flex-direction: column; gap: 6px;\">\n                <label style=\"font-size: 12px; letter-spacing: 0.15em; color: var(--accent2, #a8bcff);\">なまえ<\u002Flabel>\n                <input value=\"{{ name }}\" onchange=\"{{ setName }}\" maxlength=\"12\" placeholder=\"なまえ(なくてもOK)\" style=\"background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.18); border-radius: 10px; color: #eef2ff; padding: 11px 12px; font-family: 'Klee One', cursive; font-size: 16px;\" style-focus=\"border-color: var(--accent, #ffd98a); outline: none; box-shadow: 0 0 0 3px rgba(255,217,138,0.15);\">\n              <\u002Fdiv>\n              <div style=\"display: flex; flex-direction: column; gap: 8px;\">\n                <label style=\"font-size: 12px; letter-spacing: 0.15em; color: var(--accent2, #a8bcff);\">短冊の色<\u002Flabel>\n                <div style=\"display: flex; gap: 10px; flex-wrap: wrap;\">\n                  <sc-for list=\"{{ colors }}\" as=\"c\" hint-placeholder-count=\"6\">\n                    <button onclick=\"{{ c.pick }}\" title=\"{{ c.label }}\" style=\"width: 34px; height: 34px; border-radius: 50%; border: none; cursor: pointer; background: {{ c.hex }}; box-shadow: {{ c.ring }}; transition: transform 0.15s;\" style-hover=\"transform: scale(1.12);\"><\u002Fbutton>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display: {{ pvDisplay }}; flex-direction: column; align-items: center; justify-content: center; min-width: 96px;\">\n              <div style=\"width: 1px; height: 26px; background: rgba(255,240,200,0.55);\"><\u002Fdiv>\n              <div style=\"width: 60px; height: 164px; background: {{ pvColor }}; border-radius: 2px; position: relative; box-shadow: 0 8px 20px rgba(0,0,0,0.45), 0 0 20px rgba(255,255,255,0.2), inset 0 0 20px rgba(255,255,255,0.3); transform-origin: top center; animation: tzsway 3.2s ease-in-out infinite alternate;\">\n                <div style=\"position: absolute; top: 6px; left: 50%; margin-left: -3.5px; width: 7px; height: 7px; border-radius: 50%; background: var(--sky1, #071030);\"><\u002Fdiv>\n                <div style=\"position: absolute; top: 19px; bottom: 24px; left: 7px; right: 7px; writing-mode: vertical-rl; font-family: 'Klee One', cursive; font-weight: 600; font-size: {{ pvFs }}px; line-height: 1.55; color: #33302a; overflow: hidden;\">{{ pvText }}<\u002Fdiv>\n                <div style=\"position: absolute; bottom: 5px; left: 0; right: 0; text-align: center; font-size: 8px; color: rgba(50,45,38,0.75); font-family: 'Klee One', cursive; white-space: nowrap; overflow: hidden;\">{{ pvName }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display: flex; justify-content: flex-end; gap: 12px; margin-top: 24px;\">\n            <button onclick=\"{{ closeForm }}\" style=\"padding: 11px 24px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.25); background: rgba(0,0,0,0); color: rgba(238,242,255,0.8); font-size: 14px; letter-spacing: 0.1em; cursor: pointer; font-family: 'Zen Kaku Gothic New', sans-serif;\" style-hover=\"background: rgba(255,255,255,0.08);\">やめる<\u002Fbutton>\n            <button onclick=\"{{ submit }}\" style=\"padding: 11px 32px; border-radius: 999px; border: none; background: var(--accent, #ffd98a); color: #241a08; font-size: 15px; font-weight: 700; letter-spacing: 0.15em; cursor: {{ submitCursor }}; opacity: {{ submitOpacity }}; font-family: 'Zen Kaku Gothic New', sans-serif; box-shadow: 0 6px 20px rgba(255,217,138,0.3); transition: all 0.2s;\" style-hover=\"box-shadow: 0 8px 28px rgba(255,217,138,0.5);\">笹に飾る<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- 短冊を読むモーダル -->\n  <sc-if value=\"{{ readOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ closeRead }}\" style=\"position: absolute; inset: 0; z-index: 40; cursor: pointer;\">\n      <div style=\"position: absolute; inset: 0; background: rgba(2,4,14,0.68); backdrop-filter: blur(6px); animation: fadeIn 0.3s ease;\"><\u002Fdiv>\n      <div style=\"position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px;\">\n        <div style=\"display: flex; flex-direction: column; align-items: center; animation: readIn 0.55s cubic-bezier(0.34, 1.4, 0.44, 1);\">\n          <div style=\"width: 1px; height: 7vh; background: rgba(255,240,200,0.5);\"><\u002Fdiv>\n          <div style=\"width: 232px; height: min(62vh, 560px); min-height: 360px; background: {{ selColor }}; border-radius: 3px; position: relative; box-shadow: 0 30px 90px rgba(0,0,0,0.65), 0 0 40px rgba(255,255,255,0.18), inset 0 0 40px rgba(255,255,255,0.3);\">\n            <div style=\"position: absolute; top: 16px; left: 50%; margin-left: -7px; width: 14px; height: 14px; border-radius: 50%; background: var(--sky0, #02040f); box-shadow: inset 0 0 0 2px rgba(0,0,0,0.25);\"><\u002Fdiv>\n            <div style=\"position: absolute; top: 50px; bottom: 58px; left: 22px; right: 22px; writing-mode: vertical-rl; font-family: 'Klee One', cursive; font-weight: 600; font-size: {{ selFs }}px; line-height: 1.7; color: #33302a; overflow: hidden;\">{{ selText }}<\u002Fdiv>\n            <div style=\"position: absolute; bottom: 18px; left: 0; right: 0; text-align: center; font-size: 14px; color: rgba(50,45,38,0.8); font-family: 'Klee One', cursive;\">{{ selName }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display: flex; flex-direction: column; align-items: center; gap: 12px; animation: fadeIn 0.6s ease 0.3s both;\">\n          <div style=\"min-height: 18px; font-size: 14px; letter-spacing: 0.15em; color: #ffe9b0; text-shadow: 0 0 12px rgba(255,220,140,0.5);\">{{ starCount }}<\u002Fdiv>\n          <button onclick=\"{{ sendStar }}\" style=\"padding: 12px 30px; border-radius: 999px; border: 1px solid #ffe9b0; background: rgba(8,12,30,0.6); color: #ffe9b0; font-size: 15px; font-family: 'Zen Old Mincho', serif; letter-spacing: 0.16em; cursor: {{ starCursor }}; opacity: {{ starOpacity }}; white-space: nowrap; box-shadow: 0 0 22px rgba(255,220,140,0.2); transition: all 0.25s;\" style-hover=\"background: rgba(255,233,176,0.14); box-shadow: 0 0 32px rgba(255,220,140,0.45);\">{{ starLabel }}<\u002Fbutton>\n          <div style=\"display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;\">\n            <button onclick=\"{{ saveImage }}\" style=\"font-size: 12.5px; letter-spacing: 0.12em; border: 1px solid rgba(255,255,255,0.3); border-radius: 999px; padding: 9px 20px; background: rgba(8,12,30,0.55); color: rgba(238,242,255,0.9); cursor: pointer; white-space: nowrap;\" style-hover=\"background: rgba(255,255,255,0.1);\">短冊を画像で保存・シェア<\u002Fbutton>\n            <a href=\"{{ shareHref }}\" target=\"_blank\" rel=\"noopener\" onclick=\"{{ stopClick }}\" style=\"font-size: 12.5px; letter-spacing: 0.12em; text-decoration: none; border: 1px solid var(--accent, #ffd98a); border-radius: 999px; padding: 9px 20px; background: rgba(8,12,30,0.55); white-space: nowrap;\" style-hover=\"background: rgba(255,217,138,0.15);\">Xでシェア<\u002Fa>\n          <\u002Fdiv>\n          <div style=\"font-size: 11px; letter-spacing: 0.2em; color: rgba(238,242,255,0.55);\">画面をクリックで閉じる<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;trunkTipX&quot;: { &quot;editor&quot;: &quot;range&quot;, &quot;min&quot;: 0.45, &quot;max&quot;: 0.78, &quot;step&quot;: 0.01, &quot;default&quot;: 0.59, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;竹の形&quot; },\n  &quot;trunkBend&quot;: { &quot;editor&quot;: &quot;range&quot;, &quot;min&quot;: 0, &quot;max&quot;: 1, &quot;step&quot;: 0.05, &quot;default&quot;: 0.55, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;竹の形&quot; },\n  &quot;windStrength&quot;: { &quot;editor&quot;: &quot;range&quot;, &quot;min&quot;: 0, &quot;max&quot;: 2, &quot;step&quot;: 0.1, &quot;default&quot;: 1, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;ビジュアル&quot; },\n  &quot;soundOn&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;サウンド&quot; }\n}\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.sceneRef = React.createRef();\n    this.KEY = 'tanabata-wishes-v1';\n    let seed = 7;\n    const rnd = () => ((seed = (seed * 16807) % 2147483647) / 2147483647);\n    const stars = [];\n    for (let i = 0; i < 120; i++) {\n      stars.push({\n        x: +(rnd() * 100).toFixed(2), y: +(rnd() * 85).toFixed(2),\n        s: +(0.8 + rnd() * 2.1).toFixed(2), o: +(0.3 + rnd() * 0.65).toFixed(2),\n        t: +(2.2 + rnd() * 4.5).toFixed(2), d: +(rnd() * 6).toFixed(2)\n      });\n    }\n    for (let i = 0; i < 70; i++) {\n      const x = rnd() * 100;\n      const y = 30 - 0.34 * x + (rnd() - 0.5) * 14;\n      if (y < -2 || y > 62) continue;\n      stars.push({\n        x: +x.toFixed(2), y: +y.toFixed(2),\n        s: +(0.6 + rnd() * 1.3).toFixed(2), o: +(0.25 + rnd() * 0.5).toFixed(2),\n        t: +(2 + rnd() * 5).toFixed(2), d: +(rnd() * 6).toFixed(2)\n      });\n    }\n    this._stars = stars;\n    this._mid = this.mkTreeClusters(28, 91, 1.25);\n    this._fg = this.mkTreeClusters(8, 57, 1.4);\n    const br = [];\n    let bsd = 41;\n    const brr = () => ((bsd = (bsd * 16807) % 2147483647) / 2147483647);\n    for (let i = 0; i < 16; i++) {\n      const side = i % 2 === 0 ? 1 : -1;\n      br.push({\n        s: +(0.14 + (i / 16) * 0.82 + brr() * 0.03).toFixed(3),\n        rot: Math.round(side === 1 ? -(24 + brr() * 40) : (196 + brr() * 40)),\n        len: Math.round((130 + brr() * 130) * (1.18 - (i / 16) * 0.55)),\n        dur: +(3 + brr() * 2).toFixed(2),\n        delay: +(-brr() * 3).toFixed(2)\n      });\n    }\n    this._branches = br;\n    this._leftClusters = this.mkTreeClusters(26, 77, 1.1);\n    const lt = [];\n    let ts = 97;\n    const trr = () => ((ts = (ts * 16807) % 2147483647) / 2147483647);\n    const bgCols = ['#93e6c3', '#ff9db4', '#ffd98b', '#8fd4ff', '#c9a2ff', '#f6f2ff'];\n    for (let i = 0; i < 16; i++) {\n      const w = 20 + trr() * 10;\n      lt.push({\n        bi: Math.floor(trr() * 14),\n        t: 0.35 + trr() * 0.7,\n        ox: Math.round(trr() * 20 - 10), oy: Math.round(trr() * 12),\n        w: Math.round(w), h: Math.round(w * 2.7),\n        color: bgCols[Math.floor(trr() * bgCols.length)],\n        op: +(0.5 + trr() * 0.35).toFixed(2),\n        dur: +(2.8 + trr() * 1.8).toFixed(2), delay: +(-trr() * 4).toFixed(2)\n      });\n    }\n    this._leftTanzaku = lt;\n    const bokeh = [];\n    let bs = 21;\n    const brnd = () => ((bs = (bs * 16807) % 2147483647) / 2147483647);\n    const bcols = ['#cfe6ff', '#ffe9b0', '#ffc2e0', '#c9f4dd'];\n    for (let i = 0; i < 14; i++) {\n      const s = Math.round(4 + brnd() * 10);\n      const c = bcols[Math.floor(brnd() * bcols.length)];\n      bokeh.push({\n        x: +(brnd() * 100).toFixed(1), y: +(8 + brnd() * 80).toFixed(1),\n        s, c, glow: '0 0 ' + (s * 2) + 'px ' + Math.round(s * 0.7) + 'px ' + c + '3f',\n        dur: +(7 + brnd() * 9).toFixed(2), delay: +(-brnd() * 12).toFixed(2)\n      });\n    }\n    this._bokeh = bokeh;\n    let user = [];\n    try { user = JSON.parse(localStorage.getItem(this.KEY) || '[]') || []; } catch (e) { user = []; }\n    if (!Array.isArray(user)) user = [];\n    let mine = [];\n    try { mine = JSON.parse(localStorage.getItem(this.KEY + '-mine') || '[]') || []; } catch (e) { mine = []; }\n    let starred = [];\n    try { starred = JSON.parse(localStorage.getItem(this.KEY + '-starred') || '[]') || []; } catch (e) { starred = []; }\n    let localStars = {};\n    try { localStars = JSON.parse(localStorage.getItem(this.KEY + '-localstars') || '{}') || {}; } catch (e) { localStars = {}; }\n    this.state = { user, mine, starred, localStars, shuffleSeed: 0, formOpen: false, text: '', name: '', color: '#e2c37e', selected: null, newestId: null, theme: null, sound: null, spark: null };\n  }\n\n  mkClusters(n, seed0, baseScale, cx) {\n    let seed = seed0;\n    const rnd = () => ((seed = (seed * 16807) % 2147483647) / 2147483647);\n    const arr = [];\n    const g1s = ['#0d2a1e', '#122f23', '#173a2b', '#0a2018'];\n    const g2s = ['#245240', '#2c604a', '#356b52', '#3d7659'];\n    for (let i = 0; i < n; i++) {\n      const y = -4 + 60 * Math.pow(rnd(), 1.1);\n      const half = 5 + y * 0.28;\n      let x = (cx == null ? 72 : cx) + (rnd() * 2 - 1) * half;\n      if (x < 3) x = 3;\n      if (x > 98) x = 98;\n      const cnt = 6 + Math.floor(rnd() * 4);\n      const leaves = [];\n      for (let k = 0; k < cnt; k++) {\n        const ang = 18 + (k / Math.max(1, cnt - 1)) * 144 + (rnd() * 24 - 12);\n        const len = 26 + rnd() * 22;\n        leaves.push({\n          rot: Math.round(ang), len: Math.round(len), h: Math.max(4, Math.round(len * 0.14)),\n          g1: g1s[Math.floor(rnd() * g1s.length)], g2: g2s[Math.floor(rnd() * g2s.length)]\n        });\n      }\n      arr.push({\n        x: +x.toFixed(1), y: +y.toFixed(1),\n        scale: +(baseScale * (0.8 + rnd() * 0.5)).toFixed(2),\n        dur: +(2.2 + rnd() * 2.6).toFixed(2), delay: +(-rnd() * 3).toFixed(2),\n        leaves\n      });\n    }\n    return arr;\n  }\n\n  mkTreeClusters(n, seed0, baseScale) {\n    let seed = seed0;\n    const rnd = () => ((seed = (seed * 16807) % 2147483647) / 2147483647);\n    const g1s = ['#0d2a1e', '#122f23', '#173a2b', '#0a2018'];\n    const g2s = ['#245240', '#2c604a', '#356b52', '#3d7659'];\n    const arr = [];\n    for (let i = 0; i < n; i++) {\n      const bi = Math.floor(rnd() * 14);\n      const t = 0.3 + rnd() * 0.78;\n      const cnt = 5 + Math.floor(rnd() * 4);\n      const leaves = [];\n      for (let k = 0; k < cnt; k++) {\n        const ang = 18 + (k / Math.max(1, cnt - 1)) * 144 + (rnd() * 24 - 12);\n        const len = 26 + rnd() * 22;\n        leaves.push({\n          rot: Math.round(ang), len: Math.round(len), h: Math.max(4, Math.round(len * 0.14)),\n          g1: g1s[Math.floor(rnd() * g1s.length)], g2: g2s[Math.floor(rnd() * g2s.length)]\n        });\n      }\n      arr.push({\n        bi, t,\n        ox: Math.round(rnd() * 24 - 12), oy: Math.round(rnd() * 14 - 4),\n        scale: +(baseScale * (0.75 + rnd() * 0.5)).toFixed(2),\n        dur: +(2.2 + rnd() * 2.6).toFixed(2), delay: +(-rnd() * 3).toFixed(2),\n        leaves\n      });\n    }\n    return arr;\n  }\n\n  samples() {\n    const P = ['#7fbf9e', '#d98a96', '#e2c37e', '#7fb4d9', '#a98fd0', '#e8e4d8'];\n    return [\n      { id: 's1', text: '家族みんなが健康でいられますように', name: 'みゆき', color: P[5] },\n      { id: 's2', text: '世界一のパティシエになれますように', name: 'はると 8さい', color: P[2] },\n      { id: 's3', text: '宝くじが当たりますように', name: 'たけし', color: P[1] },\n      { id: 's4', text: 'ねこと会話できますように', name: 'ねこずき', color: P[0] },\n      { id: 's5', text: '志望校に合格しますように', name: 'さくら', color: P[4] },\n      { id: 's6', text: '毎日おいしいごはんが食べられますように', name: 'こはる', color: P[3] },\n      { id: 's7', text: '早起きできる人になりたい', name: 'よしお', color: P[0] },\n      { id: 's8', text: '織姫と彦星が今年も会えますように', name: 'ほしみ', color: P[4] },\n      { id: 's9', text: 'せかいが平和になりますように', name: 'けん', color: P[3] },\n      { id: 's10', text: '推しのライブに当選しますように', name: 'まりな', color: P[1] }\n    ];\n  }\n\n  anchorPts(branches, W, H, minY) {\n    const pts = [];\n    const yFloor = Math.max(H * 0.08, minY || 0);\n    branches.forEach((b) => {\n      if (b.s != null && b.s > 0.86) return;\n      const rad = b.rot * Math.PI / 180;\n      [1.05, 0.95, 0.85, 0.75, 0.65, 0.55, 0.45, 0.35, 0.25].forEach((t) => {\n        const x = Math.max(40, Math.min(Math.max(90, W - 50), b.x + Math.cos(rad) * b.len * t));\n        const y = Math.max(yFloor, Math.min(H * 0.6, b.y + Math.sin(rad) * b.len * t));\n        pts.push({ x: Math.round(x), y: Math.round(y) });\n      });\n    });\n    return pts;\n  }\n\n  fitFont(len, w, h, maxF, minF) {\n    for (let f = maxF; f >= minF; f -= 0.5) {\n      const cols = Math.max(1, Math.floor(w /
